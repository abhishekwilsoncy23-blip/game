<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Eagle Streamer 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #hud {
            position: absolute; top: 20px; left: 20px; color: #00ff00;
            background: rgba(0, 40, 0, 0.7); padding: 15px; border: 1px solid #00ff00;
            pointer-events: none; text-transform: uppercase; font-size: 12px;
        }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ff00; font-size: 20px; display: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">
        <div>System: Eagle-Eye Streamer</div>
        <div id="coords">Lat: 0 | Lon: 0</div>
        <div id="status">Status: Initializing...</div>
        <div style="margin-top:10px;">[W/S] Pitch | [A/D] Yaw | [Space] Boost</div>
    </div>
    <div id="loading">STREAMING SECTOR DATA...</div>

    <script>
        // --- CONFIGURATION ---
        let lat = 51.5074; // Starting Location: London
        let lon = -0.1278;
        const FETCH_RADIUS = 600; // Meters
        const UPDATE_THRESHOLD = 300; // Refetch after moving 300m
        
        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.0007);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 1).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- FLIGHT LOGIC ---
        let velocity = 2.0;
        let rotation = new THREE.Euler(0, 0, 0, 'YXZ');
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        camera.position.set(0, 150, 0);

        // --- OSM STREAMING LOGIC ---
        let lastFetchPos = new THREE.Vector3(0, 0, 0);
        let loadedWays = new Set(); 

        async function fetchMapData(currentLat, currentLon) {
            document.getElementById('status').innerText = "Status: Fetching OSM Stream...";
            document.getElementById('loading').style.display = "block";

            const query = `[out:json];
                (
                  way(around:${FETCH_RADIUS},${currentLat},${currentLon})["building"];
                );
                out body; >; out skel qt;`;
            
            try {
                const response = await fetch('https://overpass-api.de/api/interpreter', {
                    method: 'POST',
                    body: query
                });
                const data = await response.json();
                renderBuildings(data);
                document.getElementById('status').innerText = "Status: Online";
            } catch (e) {
                document.getElementById('status').innerText = "Status: Stream Error (Timeout)";
            } finally {
                document.getElementById('loading').style.display = "none";
            }
        }

        function renderBuildings(data) {
            const nodes = {};
            data.elements.forEach(el => { if (el.type === 'node') nodes[el.id] = el; });

            data.elements.forEach(el => {
                if (el.type === 'way' && !loadedWays.has(el.id)) {
                    loadedWays.add(el.id);
                    const coords = el.nodes.map(id => nodes[id]);
                    const points = coords.map(n => {
                        // Convert Lat/Lon to Local Meters relative to the Eagle
                        const x = (n.lon - lon) * 111320 * Math.cos(lat * Math.PI / 180);
                        const z = (n.lat - lat) * 111320;
                        return new THREE.Vector2(x, -z);
                    });

                    const shape = new THREE.Shape(points);
                    const height = el.tags.height ? parseFloat(el.tags.height) : (Math.random() * 30 + 10);
                    const geom = new THREE.ExtrudeGeometry(shape, { depth: height, bevelEnabled: false });
                    const mat = new THREE.MeshPhongMaterial({ color: 0x222222 });
                    const mesh = new THREE.Mesh(geom, mat);
                    
                    mesh.rotation.x = -Math.PI / 2;
                    // Add wireframe
                    const wire = new THREE.LineSegments(
                        new THREE.EdgesGeometry(geom),
                        new THREE.LineBasicMaterial({ color: 0x00ff00 })
                    );
                    mesh.add(wire);
                    scene.add(mesh);
                }
            });
        }

        // Convert 3D position back to GPS to update the stream
        function updateGps() {
            const currentLon = lon + (camera.position.x / (111320 * Math.cos(lat * Math.PI / 180)));
            const currentLat = lat + (camera.position.z / -111320);
            
            document.getElementById('coords').innerText = `Lat: ${currentLat.toFixed(5)} | Lon: ${currentLon.toFixed(5)}`;

            // If we moved far enough, stream new sector
            if (camera.position.distanceTo(lastFetchPos) > UPDATE_THRESHOLD) {
                lastFetchPos.copy(camera.position);
                fetchMapData(currentLat, currentLon);
            }
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Controls
            const speed = keys['Space'] ? 4.0 : 1.5;
            if (keys['KeyW']) rotation.x -= 0.02;
            if (keys['KeyS']) rotation.x += 0.02;
            if (keys['KeyA']) rotation.y += 0.03;
            if (keys['KeyD']) rotation.y -= 0.03;

            camera.quaternion.setFromEuler(rotation);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            camera.position.addScaledVector(dir, speed);

            updateGps();
            renderer.render(scene, camera);
        }

        // Initial Load
        fetchMapData(lat, lon);
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
