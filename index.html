<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Eagle Infinity - Lush World</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000510; font-family: 'Courier New', monospace; }
        #hud {
            position: absolute; top: 20px; left: 20px; color: #00ffcc;
            background: rgba(0, 10, 20, 0.8); padding: 15px; border: 1px solid #00ffcc;
            pointer-events: none; text-transform: uppercase; font-size: 11px; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
        .label { color: #55aaaa; margin-right: 5px; }
        .val { color: #ffffff; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">
        <div style="font-weight:bold; border-bottom:1px solid #00ffcc; margin-bottom:8px; padding-bottom:5px;">Eagle Flight System v4.0</div>
        <div><span class="label">Biome:</span><span id="biome" class="val">Scanning...</span></div>
        <div><span class="label">Alt:</span><span id="alt" class="val">0</span>m</div>
        <div><span class="label">Pos:</span><span id="pos" class="val">0, 0</span></div>
        <div style="margin-top:10px; font-size: 9px; color: #008888;">[W/S] Pitch | [A/D] Yaw | [Space] Afterburner</div>
    </div>

    <script>
        // --- 1. SETTINGS & WORLD SCALE ---
        const TILE_SIZE = 2500; 
        const VIEW_DIST = 1; // Renders 3x3 grid around player
        
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000815, 0.0003); // Deep atmospheric fog
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 30000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000815);
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambient = new THREE.AmbientLight(0x4444ff, 0.4);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(1000, 2000, 1000);
        scene.add(sun);

        // --- 2. BIOME DEFINITIONS ---
        const BIOMES = {
            CITY: { color: 0x111111, ground: 0x0a0a0a },
            FOREST: { color: 0x0c1a0c, ground: 0x1b2411 }, // Muddy green
            MOUNTAIN: { color: 0x333333, ground: 0x222222 },
            LAKE: { color: 0x001133, ground: 0x002244 }
        };

        const tiles = new Map();

        // Deterministic noise for Biome mapping
        function getBiomeType(tx, tz) {
            const noise = (Math.sin(tx * 0.5) + Math.sin(tz * 0.5)) / 2;
            if (noise > 0.4) return 'CITY';
            if (noise > 0.0) return 'FOREST';
            if (noise > -0.5) return 'MOUNTAIN';
            return 'LAKE';
        }

        function createTile(tx, tz) {
            const group = new THREE.Group();
            const type = getBiomeType(tx, tz);
            const conf = BIOMES[type];
            const x = tx * TILE_SIZE;
            const z = tz * TILE_SIZE;

            // Ground Plane
            const groundGeo = new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE);
            const groundMat = new THREE.MeshLambertMaterial({ color: conf.ground });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.set(x, 0, z);
            group.add(ground);

            // Populate Objects based on Biome
            if (type === 'CITY') {
                for(let i=0; i<80; i++) {
                    const h = Math.random() * Math.random() * 300 + 30;
                    const w = Math.random() * 30 + 20;
                    const bGeo = new THREE.BoxGeometry(w, h, w);
                    const bMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
                    const b = new THREE.Mesh(bGeo, bMat);
                    b.position.set(x + (Math.random()-0.5)*TILE_SIZE, h/2, z + (Math.random()-0.5)*TILE_SIZE);
                    
                    const edges = new THREE.EdgesGeometry(bGeo);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.4 }));
                    b.add(line);
                    group.add(b);
                }
            } else if (type === 'FOREST') {
                const leafMat = new THREE.MeshLambertMaterial({ color: 0x1a2e1a });
                for(let i=0; i<250; i++) {
                    const h = Math.random() * 50 + 20;
                    const t = new THREE.Mesh(new THREE.ConeGeometry(12, h, 5), leafMat);
                    t.position.set(x + (Math.random()-0.5)*TILE_SIZE, h/2, z + (Math.random()-0.5)*TILE_SIZE);
                    group.add(t);
                }
            } else if (type === 'MOUNTAIN') {
                for(let i=0; i<12; i++) {
                    const h = Math.random() * 800 + 300;
                    const r = Math.random() * 200 + 200;
                    const m = new THREE.Mesh(new THREE.ConeGeometry(r, h, 4), new THREE.MeshPhongMaterial({ color: 0x333333, shininess: 5 }));
                    m.position.set(x + (Math.random()-0.5)*TILE_SIZE, h/2, z + (Math.random()-0.5)*TILE_SIZE);
                    m.rotation.y = Math.random() * Math.PI;
                    group.add(m);
                }
            } else if (type === 'LAKE') {
                const waterMat = new THREE.MeshPhongMaterial({ color: 0x004488, transparent: true, opacity: 0.7, shininess: 100 });
                const water = new THREE.Mesh(new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE), waterMat);
                water.rotation.x = -Math.PI / 2;
                water.position.set(x, 5, z); // Slightly above ground
                group.add(water);
            }

            scene.add(group);
            return { group, type };
        }

        // --- 3. FLIGHT ENGINE ---
        let rotation = new THREE.Euler(0, 0, 0, 'YXZ');
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        camera.position.set(0, 400, 0);

        function updateMap() {
            const curX = Math.round(camera.position.x / TILE_SIZE);
            const curZ = Math.round(camera.position.z / TILE_SIZE);

            // Load new tiles
            for (let i = -VIEW_DIST; i <= VIEW_DIST; i++) {
                for (let j = -VIEW_DIST; j <= VIEW_DIST; j++) {
                    const key = `${curX + i},${curZ + j}`;
                    if (!tiles.has(key)) {
                        tiles.set(key, createTile(curX + i, curZ + j));
                    }
                }
            }

            // Unload far tiles
            for (const [key, val] of tiles) {
                const [tx, tz] = key.split(',').map(Number);
                if (Math.abs(tx - curX) > VIEW_DIST + 1 || Math.abs(tz - curZ) > VIEW_DIST + 1) {
                    scene.remove(val.group);
                    tiles.delete(key);
                }
            }

            // HUD
            const active = tiles.get(`${curX},${curZ}`);
            if (active) document.getElementById('biome').innerText = active.type;
            document.getElementById('pos').innerText = `${Math.floor(camera.position.x)}, ${Math.floor(camera.position.z)}`;
            document.getElementById('alt').innerText = Math.floor(camera.position.y);
        }

        // --- 4. LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const speed = keys['Space'] ? 18.0 : 6.5;
            if (keys['KeyW']) rotation.x -= 0.02;
            if (keys['KeyS']) rotation.x += 0.02;
            if (keys['KeyA']) rotation.y += 0.025;
            if (keys['KeyD']) rotation.y -= 0.025;

            camera.quaternion.setFromEuler(rotation);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            camera.position.addScaledVector(dir, speed);

            // Level limiter
            if (camera.position.y < 15) camera.position.y = 15;
            if (camera.position.y > 2000) camera.position.y = 2000;

            updateMap();
            renderer.render(scene, camera);
        }

        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
