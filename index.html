<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Eagle Procedural - Infinity</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #hud {
            position: absolute; top: 20px; left: 20px; color: #00ffcc;
            background: rgba(0, 10, 10, 0.8); padding: 15px; border: 1px solid #00ffcc;
            pointer-events: none; text-transform: uppercase; font-size: 12px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">
        <div>System: Procedural Eagle</div>
        <div id="dist">Distance: 0m</div>
        <div>Status: Generating Infinity...</div>
        <div style="margin-top:10px; color: #55aaaa;">[W/S] Pitch | [A/D] Yaw | [Space] Boost</div>
    </div>

    <script>
        // --- 1. ENGINE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000505, 0.0008);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 20000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0x00ffcc, 0.2);
        scene.add(ambient);

        // --- 2. PROCEDURAL GENERATION CONFIG ---
        const CHUNK_SIZE = 1000;
        let visibleChunks = new Map();
        const buildingMaterial = new THREE.MeshPhongMaterial({ color: 0x111111 });
        const wireMaterial = new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.4 });

        // Simple "Road" function: A winding sine wave
        function getRoadX(z) {
            return Math.sin(z * 0.001) * 200 + Math.sin(z * 0.0004) * 400;
        }

        function createChunk(zChunk) {
            const group = new THREE.Group();
            const startZ = zChunk * CHUNK_SIZE;

            // Add Ground Grid for this chunk
            const grid = new THREE.GridHelper(CHUNK_SIZE, 20, 0x004444, 0x001111);
            grid.position.set(getRoadX(startZ), 0, startZ + CHUNK_SIZE/2);
            group.add(grid);

            // Populate with Buildings
            for (let i = 0; i < 40; i++) {
                const bH = Math.random() * Math.random() * 150 + 20;
                const bW = Math.random() * 20 + 10;
                const bD = Math.random() * 20 + 10;
                
                const geom = new THREE.BoxGeometry(bW, bH, bD);
                const mesh = new THREE.Mesh(geom, buildingMaterial);

                // Position building randomly, but keep the road clear
                let bx = (Math.random() - 0.5) * 1200;
                let bz = startZ + Math.random() * CHUNK_SIZE;
                
                // Keep buildings away from the "Road" center
                const roadX = getRoadX(bz);
                if (Math.abs(bx - roadX) < 60) bx += (bx > roadX ? 100 : -100);

                mesh.position.set(bx, bH / 2, bz);
                
                // Add Neon Edges
                const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geom), wireMaterial);
                mesh.add(wire);
                
                group.add(mesh);
            }

            scene.add(group);
            return group;
        }

        // --- 3. FLIGHT CONTROLS ---
        let rotation = new THREE.Euler(0, 0, 0, 'YXZ');
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        camera.position.set(0, 50, 0);

        // --- 4. INFINITY LOGIC ---
        function updateChunks() {
            const currentChunkZ = Math.floor(camera.position.z / CHUNK_SIZE);
            
            // Generate 5 chunks ahead, keep 1 behind
            for (let z = currentChunkZ - 1; z < currentChunkZ + 6; z++) {
                if (!visibleChunks.has(z)) {
                    visibleChunks.set(z, createChunk(z));
                }
            }

            // Cleanup old chunks
            for (const [z, group] of visibleChunks) {
                if (z < currentChunkZ - 2) {
                    scene.remove(group);
                    visibleChunks.delete(z);
                }
            }
        }

        // --- 5. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Movement
            const speed = keys['Space'] ? 8.0 : 3.0;
            if (keys['KeyW']) rotation.x -= 0.02;
            if (keys['KeyS']) rotation.x += 0.02;
            if (keys['KeyA']) rotation.y += 0.03;
            if (keys['KeyD']) rotation.y -= 0.03;

            camera.quaternion.setFromEuler(rotation);
            const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(camera.quaternion);
            camera.position.addScaledVector(dir, speed);

            // Floor collision
            if (camera.position.y < 5) camera.position.y = 5;

            updateChunks();
            
            document.getElementById('dist').innerText = `Distance: ${Math.floor(camera.position.z)}m`;
            renderer.render(scene, camera);
        }

        animate();
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
