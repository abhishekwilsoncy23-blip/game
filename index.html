<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Slow Flight - Procedural Zen</title>
    <style>
        body { margin: 0; overflow: hidden; background: #ffccaa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #hud {
            position: absolute; top: 20px; left: 20px; color: #554433;
            background: rgba(255, 255, 255, 0.4); padding: 15px; border-left: 4px solid #ff8855;
            pointer-events: none; text-transform: uppercase; font-size: 12px; letter-spacing: 2px;
            border-radius: 8px; backdrop-filter: blur(8px);
        }
        .val { color: #cc4400; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">
        <div style="font-weight:bold; margin-bottom:8px;">ZEN FLIGHT SYSTEM</div>
        <div>Altitude: <span id="alt" class="val">0</span>m</div>
        <div>Speed: <span class="val">CRUISE</span></div>
        <div style="margin-top:10px; font-size: 10px; color: #665544;">[W/S] Pitch | [A/D] Yaw</div>
    </div>

    <script>
        // --- 1. SLOW ROADS AESTHETIC (SCENE, FOG, LIGHTING) ---
        const scene = new THREE.Scene();
        
        // Soft peach/orange sunset colors
        const skyColor = new THREE.Color(0xffccaa);
        scene.background = skyColor;
        
        // Thick, soft fog to hide the horizon (Crucial for the Slow Roads look)
        scene.fog = new THREE.FogExp2(skyColor, 0.003);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // Soften the shadows and output
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // Hemisphere light (Sky color bouncing off the ground)
        const hemiLight = new THREE.HemisphereLight(0xffeedd, 0xaa5533, 0.6);
        scene.add(hemiLight);

        // Warm directional sun
        const sun = new THREE.DirectionalLight(0xffaa55, 1.0);
        sun.position.set(100, 200, 50);
        scene.add(sun);

        // --- 2. ENDLESS PROCEDURAL TERRAIN ---
        const CHUNK_SIZE = 400;
        const SEGMENTS = 30; // Low-poly look
        const terrainChunks = new Map();

        // The stylized green ground material
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x66bb66, 
            roughness: 1.0, 
            metalness: 0.0,
            flatShading: true // Gives it that crisp, low-poly indie game look
        });

        // Procedural Math: Combines sine waves to make smooth, organic hills
        function getElevation(x, z) {
            let height = Math.sin(x * 0.01) * Math.cos(z * 0.01) * 30;
            height += Math.sin(x * 0.02 + z * 0.03) * 10;
            return height;
        }

        function createChunk(cx, cz) {
            const geo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, SEGMENTS, SEGMENTS);
            geo.rotateX(-Math.PI / 2);

            // Morph the flat plane into hills using our math function
            const vertices = geo.attributes.position.array;
            for (let i = 0; i < vertices.length; i += 3) {
                const worldX = vertices[i] + (cx * CHUNK_SIZE);
                const worldZ = vertices[i+2] + (cz * CHUNK_SIZE);
                vertices[i+1] = getElevation(worldX, worldZ); 
            }
            geo.computeVertexNormals(); // Recalculate light reflections

            const mesh = new THREE.Mesh(geo, groundMat);
            mesh.position.set(cx * CHUNK_SIZE, 0, cz * CHUNK_SIZE);
            scene.add(mesh);
            return mesh;
        }

        // --- 3. MINIMALIST GLIDER ---
        const gliderGroup = new THREE.Group();
        const gliderMat = new THREE.MeshStandardMaterial({ color: 0xffffff, flatShading: true });
        
        // Triangle shape for a paper-plane style glider
        const gliderGeo = new THREE.ConeGeometry(3, 10, 3);
        gliderGeo.rotateX(Math.PI / 2);
        const gliderMesh = new THREE.Mesh(gliderGeo, gliderMat);
        gliderGroup.add(gliderMesh);

        // Follow Camera
        eagleGroup = gliderGroup; // Using eagleGroup name so logic stays same
        eagleGroup.add(camera);
        camera.position.set(0, 15, 30); 
        camera.lookAt(0, 0, -20);

        scene.add(eagleGroup);
        eagleGroup.position.set(0, 100, 0);

        // --- 4. ENGINE LOGIC ---
        function updateTerrain() {
            const curX = Math.round(eagleGroup.position.x / CHUNK_SIZE);
            const curZ = Math.round(eagleGroup.position.z / CHUNK_SIZE);
            const viewDist = 2; // Load 5x5 grid around player

            for (let i = -viewDist; i <= viewDist; i++) {
                for (let j = -viewDist; j <= viewDist; j++) {
                    const key = `${curX + i},${curZ + j}`;
                    if (!terrainChunks.has(key)) terrainChunks.set(key, createChunk(curX + i, curZ + j));
                }
            }

            // Unload chunks left behind
            for (const [key, mesh] of terrainChunks) {
                const [tx, tz] = key.split(',').map(Number);
                if (Math.abs(tx - curX) > viewDist + 1 || Math.abs(tz - curZ) > viewDist + 1) {
                    scene.remove(mesh);
                    mesh.geometry.dispose();
                    terrainChunks.delete(key);
                }
            }
        }

        let rotation = new THREE.Euler(0, 0, 0, 'YXZ');
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function animate() {
            requestAnimationFrame(animate);

            // Smooth, relaxing flight controls
            if (keys['KeyW']) rotation.x -= 0.005;
            if (keys['KeyS']) rotation.x += 0.005;
            if (keys['KeyA']) rotation.y += 0.01;
            if (keys['KeyD']) rotation.y -= 0.01;

            eagleGroup.quaternion.setFromEuler(rotation);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(eagleGroup.quaternion);
            eagleGroup.position.addScaledVector(dir, 1.5); // Slower, chill speed

            // Visual banking
            eagleGroup.rotation.z = THREE.MathUtils.lerp(eagleGroup.rotation.z, keys['KeyA'] ? 0.3 : (keys['KeyD'] ? -0.3 : 0), 0.05);

            // Ground collision detection (bounce off hills softly)
            const groundHeight = getElevation(eagleGroup.position.x, eagleGroup.position.z);
            if (eagleGroup.position.y < groundHeight + 5) {
                eagleGroup.position.y = groundHeight + 5;
                rotation.x = 0; // Level out
            }

            document.getElementById('alt').innerText = Math.floor(eagleGroup.position.y - groundHeight);

            updateTerrain();
            renderer.render(scene, camera);
        }

        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
