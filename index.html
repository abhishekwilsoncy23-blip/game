<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cy Planet: Strategic Card Battle</title>
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #ff00ff;
            --bg-color: #0b0f19;
            --card-bg: #162032;
            --text: #e2e8f0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; text-align: center;
        }

        h1 { color: var(--primary); text-shadow: 0 0 10px var(--primary); margin-bottom: 10px;}
        
        button {
            background-color: var(--primary); color: #000;
            border: none; padding: 12px 24px; font-size: 1.1rem;
            font-weight: bold; border-radius: 8px; cursor: pointer;
            transition: 0.2s; margin: 10px;
        }
        button:hover:not(:disabled) { background-color: #fff; box-shadow: 0 0 15px var(--primary); }
        button:disabled { background-color: #334155; color: #64748b; cursor: not-allowed; box-shadow: none; border: 1px solid #1e293b; }

        input {
            padding: 10px; font-size: 1.1rem; border-radius: 5px;
            border: 1px solid var(--primary); background: #1e293b; color: white;
            margin: 5px; text-align: center;
        }

        /* Live Scoreboard */
        #global-scoreboard {
            display: none; flex-wrap: wrap; justify-content: center; gap: 20px;
            background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 10px;
            border: 1px solid var(--secondary); margin-bottom: 20px; width: 100%; max-width: 900px;
        }
        .score-item { font-size: 1.1rem; font-weight: bold; }
        .score-item span { color: var(--primary); font-size: 1.4rem; margin-left: 5px; text-shadow: 0 0 5px var(--primary); }

        /* Screens */
        #loading-screen, #setup-screen, #pass-screen, #play-screen, #result-screen { display: none; width: 100%; max-width: 900px; }
        .active-screen { display: flex !important; flex-direction: column; align-items: center; }

        /* Deck View Area */
        .deck-container {
            display: flex; gap: 15px; overflow-x: auto; padding: 20px 10px; width: 100%;
            background: rgba(0,0,0,0.5); border-radius: 10px; margin-top: 10px;
            border: 1px solid #334155;
        }
        .deck-container::-webkit-scrollbar { height: 10px; }
        .deck-container::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 5px; }

        /* Card Styles */
        .card {
            background-color: var(--card-bg); width: 220px; min-width: 220px;
            border-radius: 10px; border: 2px solid #334155;
            padding: 15px; cursor: pointer; transition: 0.3s; text-align: left;
            position: relative;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .card.selected { border-color: var(--secondary); box-shadow: 0 0 15px var(--secondary); transform: scale(1.05); }
        
        .card-title { font-size: 1.1rem; font-weight: bold; color: #fff; margin-bottom: 5px; border-bottom: 1px solid #334; padding-bottom: 5px;}
        .stat-line { display: flex; justify-content: space-between; font-size: 0.9rem; margin: 4px 0; background: #1e293b; padding: 4px 8px; border-radius: 4px; }
        .stat-line.highlight { background: var(--primary); color: #000; font-weight: bold; }
        .stat-line.used-stat { color: #64748b; text-decoration: line-through; }

        /* Play Area */
        .table-area {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px;
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; width: 100%; min-height: 150px;
        }
        .table-card { transform: scale(0.9); pointer-events: none; }

        /* Action Panel */
        #action-panel { margin-top: 20px; padding: 20px; border: 1px dashed var(--primary); border-radius: 10px; width: 100%; display: none;}
        .stat-btn { background: #1e293b; color: white; border: 1px solid var(--primary); margin: 5px; padding: 10px 15px;}
        .stat-btn:hover:not(:disabled) { background: var(--primary); color: black; }

        .status-box { background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 10px; margin-bottom: 10px; width: 100%; }
        .winner-tag { color: var(--secondary); font-weight: bold; font-size: 1.5rem; text-shadow: 0 0 10px var(--secondary); margin-top:10px;}
        
        /* Collection Animation Note */
        .collection-note { color: var(--primary); font-size: 1.2rem; font-weight: bold; margin-top: 10px; background: #0b0f19; padding: 10px; border-radius: 8px; border: 1px solid var(--primary);}
    </style>
</head>
<body>

    <h1>CY PLANET: STRATEGIC BATTLE</h1>

    <div id="global-scoreboard"></div>

    <div id="loading-screen" class="active-screen">
        <h2>Loading Card Data...</h2>
        <p>Fetching students.json...</p>
    </div>

    <div id="setup-screen">
        <h3>How many players? (2-6)</h3>
        <input type="number" id="num-players" min="2" max="6" value="2">
        <button onclick="generateNameInputs()">Next</button>
        <div id="name-inputs" style="margin-top: 20px; display: flex; flex-direction: column;"></div>
    </div>

    <div id="pass-screen">
        <h2 style="font-size: 2.5rem; color: var(--secondary);">STOP! 🛑</h2>
        <h3 id="pass-msg" style="font-size: 1.5rem;">Pass the device to [Player]</h3>
        <p>Make sure no one else is looking at the screen!</p>
        <button onclick="showPlayScreen()" style="padding: 20px 40px; font-size: 1.5rem; margin-top:30px;">I am Ready</button>
    </div>

    <div id="play-screen">
        <div class="status-box">
            <h2 id="current-player-name" style="margin:0; color: var(--primary);">Player Turn</h2>
            <p id="target-stat-msg" style="color: var(--secondary); font-weight: bold; font-size: 1.2rem; margin-top:5px;"></p>
        </div>

        <h3>Cards on the Table:</h3>
        <div class="table-area" id="current-table-area"></div>
        
        <h3>Your Deck: (Select 1 Card to play)</h3>
        <div class="deck-container" id="player-deck-container"></div>

        <div id="action-panel">
            <div id="leader-actions">
                <h4>Choose a Stat to challenge others:</h4>
                <button class="stat-btn" id="btn-rollno" onclick="playCardAsLeader('rollno')">Roll No.</button>
                <button class="stat-btn" id="btn-strength" onclick="playCardAsLeader('strength')">Strength</button>
                <button class="stat-btn" id="btn-height" onclick="playCardAsLeader('height')">Height</button>
                <button class="stat-btn" id="btn-weight" onclick="playCardAsLeader('weight')">Weight</button>
                <button class="stat-btn" id="btn-cgpa" onclick="playCardAsLeader('cgpa')">CGPA</button>
                <button class="stat-btn" id="btn-absent_rate" onclick="playCardAsLeader('absent_rate')">Absent Rate</button>
            </div>
            <div id="follower-actions" style="display:none;">
                <button onclick="playCardAsFollower()" style="padding: 15px 30px; font-size: 1.2rem;">Play Selected Card</button>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <h2 id="round-winner-msg" style="font-size: 2rem;"></h2>
        <p id="round-stat-msg"></p>
        <div id="cards-collected-msg" class="collection-note"></div>
        
        <div class="table-area" id="result-table-area"></div>
        
        <button onclick="nextRound()" style="margin-top: 30px; font-size: 1.3rem;">Start Next Round</button>
    </div>

    <script>
        let allCards = [];
        let players = [];
        let tableCards = []; 
        let turnQueue = [];  
        let activeStat = null; 
        let pot = []; 
        let selectedCardIndex = null;
        
        // Track which stats have not been used yet
        let availableStats = ['rollno', 'strength', 'height', 'weight', 'cgpa', 'absent_rate'];

        const statLabels = {
            "rollno": "Roll No.",
            "strength": "Strength", 
            "height": "Height",
            "weight": "Weight", 
            "cgpa": "CGPA", 
            "absent_rate": "Absent Rate"
        };

        // --- 1. Load JSON Data ---
        window.onload = async function() {
            try {
                const response = await fetch('students.json');
                if (!response.ok) throw new Error("File not found");
                const data = await response.json();
                
                allCards = Object.keys(data).map(key => {
                    return { rollno: parseInt(key), ...data[key] };
                });

                switchScreen('setup-screen');
            } catch (error) {
                document.getElementById('loading-screen').innerHTML = `
                    <h2 style="color:red;">Error Loading students.json!</h2>
                    <p>Make sure you are running a <b>Local Web Server</b> (like Live Server in VS Code) and that students.json is in the same folder.</p>
                `;
                console.error(error);
            }
        };

        function switchScreen(screenId) {
            document.querySelectorAll('body > div.active-screen').forEach(div => div.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }

        // Live Scoreboard Updater
        function updateScoreboard() {
            const sb = document.getElementById('global-scoreboard');
            if (players.length === 0) {
                sb.style.display = 'none';
                return;
            }
            sb.style.display = 'flex';
            let html = '';
            players.forEach(p => {
                html += `<div class="score-item">${p.name}: <span>${p.deck.length}</span></div>`;
            });
            if (pot.length > 0) {
                html += `<div class="score-item" style="color:var(--secondary)">POT: <span>${pot.length}</span></div>`;
            }
            sb.innerHTML = html;
        }

        // --- 2. Setup Game ---
        function generateNameInputs() {
            const count = parseInt(document.getElementById('num-players').value);
            const container = document.getElementById('name-inputs');
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                container.innerHTML += `<input type="text" id="p-name-${i}" placeholder="Player ${i+1} Name">`;
            }
            container.innerHTML += `<button onclick="startGame()" style="margin-top:15px; background:var(--secondary)">DEAL CARDS</button>`;
        }

        function startGame() {
            const count = parseInt(document.getElementById('num-players').value);
            players = [];
            availableStats = ['rollno', 'strength', 'height', 'weight', 'cgpa', 'absent_rate'];
            
            for (let i = 0; i < count; i++) {
                let name = document.getElementById(`p-name-${i}`).value || `Player ${i+1}`;
                players.push({ id: i, name: name, deck: [] });
            }

            let deck = [...allCards].sort(() => Math.random() - 0.5);

            let pIndex = 0;
            while(deck.length > 0) {
                players[pIndex].deck.push(deck.pop());
                pIndex = (pIndex + 1) % players.length;
            }

            let firstLeader = players[Math.floor(Math.random() * players.length)].id;
            updateScoreboard();
            startNewRound(firstLeader);
        }

        // --- 3. Round Logic ---
        function startNewRound(leaderId) {
            let alivePlayers = players.filter(p => p.deck.length > 0);
            
            // End conditions
            if (players.length > 2 && alivePlayers.length === 2) {
                let p1 = alivePlayers[0];
                let p2 = alivePlayers[1];
                if (p1.deck.length > p2.deck.length) {
                    alert(`🏆 GAME OVER! ${p1.name} WINS with ${p1.deck.length} cards!`);
                } else if (p2.deck.length > p1.deck.length) {
                    alert(`🏆 GAME OVER! ${p2.name} WINS with ${p2.deck.length} cards!`);
                } else {
                    alert(`🏆 IT'S A PERFECT TIE!`);
                }
                location.reload();
                return;
            }

            if (alivePlayers.length <= 1) {
                let winnerName = alivePlayers.length === 1 ? alivePlayers[0].name : "NOBODY";
                alert(`🏆 ${winnerName} HAS COLLECTED ALL CARDS AND WINS!`);
                location.reload();
                return;
            }
            
            // Check if all stats have been exhausted. If yes, reset them so game doesn't break!
            if (availableStats.length === 0) {
                alert("All stats have been played! The stat pool has been refreshed.");
                availableStats = ['rollno', 'strength', 'height', 'weight', 'cgpa', 'absent_rate'];
            }

            tableCards = [];
            activeStat = null;
            
            turnQueue = [];
            let startIndex = alivePlayers.findIndex(p => p.id === leaderId);
            for(let i = 0; i < alivePlayers.length; i++) {
                turnQueue.push(alivePlayers[(startIndex + i) % alivePlayers.length].id);
            }

            updateScoreboard();
            triggerPassScreen();
        }

        function triggerPassScreen() {
            if (turnQueue.length === 0) {
                resolveRound();
                return;
            }
            let nextPlayerId = turnQueue[0];
            let p = players.find(p => p.id === nextPlayerId);
            
            document.getElementById('pass-msg').innerText = `Pass the device to: ${p.name}`;
            switchScreen('pass-screen');
        }

        function showPlayScreen() {
            let pId = turnQueue[0];
            let p = players.find(p => p.id === pId);
            selectedCardIndex = null;
            
            document.getElementById('current-player-name').innerText = p.name;
            
            let isLeader = (activeStat === null);
            document.getElementById('target-stat-msg').innerText = isLeader ? 
                "You are leading! Pick a card and an available stat." : 
                `Beat this Stat: ${statLabels[activeStat]}!`;

            // Draw Leader Buttons and disable exhausted stats
            if (isLeader) {
                ['rollno', 'strength', 'height', 'weight', 'cgpa', 'absent_rate'].forEach(stat => {
                    let btn = document.getElementById(`btn-${stat}`);
                    if(availableStats.includes(stat)) {
                        btn.disabled = false;
                        btn.innerText = statLabels[stat];
                    } else {
                        btn.disabled = true;
                        btn.innerText = statLabels[stat] + " (Used)";
                    }
                });
            }

            // Draw Cards on Table
            let tableHtml = "";
            tableCards.forEach(tc => {
                tableHtml += `<div class="card table-card">
                    <div style="color:var(--secondary); font-weight:bold; text-align:center; border-bottom: 1px solid #334; margin-bottom: 5px; padding-bottom: 5px;">${tc.player.name}'s Card</div>
                    <div class="card-title">${tc.card.name} <span style="float:right;">#${tc.card.rollno}</span></div>
                    ${['rollno', 'strength', 'height', 'weight', 'cgpa', 'absent_rate'].map(stat => 
                        `<div class="stat-line ${activeStat === stat ? 'highlight' : ''}"><span>${statLabels[stat]}</span><span>${tc.card[stat]}</span></div>`
                    ).join('')}
                </div>`;
            });
            document.getElementById('current-table-area').innerHTML = tableHtml || "<p style='color:#888;'>Table is empty. You go first!</p>";

            // Draw Deck (Strike through used stats for visual clarity)
            let deckHtml = "";
            p.deck.forEach((card, index) => {
                deckHtml += `
                <div class="card" id="deck-card-${index}" onclick="selectCard(${index})">
                    <div class="card-title">${card.name}</div>
                    ${['rollno', 'strength', 'height', 'weight', 'cgpa', 'absent_rate'].map(stat => {
                        let classStr = activeStat === stat ? 'highlight' : '';
                        if(!availableStats.includes(stat) && activeStat !== stat) classStr += ' used-stat';
                        return `<div class="stat-line ${classStr}"><span>${statLabels[stat]}</span><span>${card[stat]}</span></div>`
                    }).join('')}
                </div>`;
            });
            document.getElementById('player-deck-container').innerHTML = deckHtml;

            document.getElementById('action-panel').style.display = 'none'; 
            document.getElementById('leader-actions').style.display = isLeader ? 'block' : 'none';
            document.getElementById('follower-actions').style.display = isLeader ? 'none' : 'block';

            switchScreen('play-screen');
        }

        function selectCard(index) {
            selectedCardIndex = index;
            document.querySelectorAll('#player-deck-container .card').forEach(el => el.classList.remove('selected'));
            document.getElementById(`deck-card-${index}`).classList.add('selected');
            document.getElementById('action-panel').style.display = 'block';
            document.getElementById('action-panel').scrollIntoView({behavior: "smooth"});
        }

        function playCardAsLeader(stat) {
            activeStat = stat;
            // Remove stat from available pool so it can't be used again
            availableStats = availableStats.filter(s => s !== stat);
            finalizePlay();
        }

        function playCardAsFollower() {
            finalizePlay();
        }

        function finalizePlay() {
            let pId = turnQueue.shift();
            let p = players.find(p => p.id === pId);
            
            // Take card from player deck, put on table
            let playedCard = p.deck.splice(selectedCardIndex, 1)[0];
            tableCards.push({ player: p, card: playedCard });
            
            updateScoreboard();
            triggerPassScreen();
        }

        // --- 4. Resolve Round ---
        function resolveRound() {
            let bestVal = activeStat === 'absent_rate' ? Infinity : -Infinity;
            let winners = [];

            tableCards.forEach(tc => {
                let val = tc.card[activeStat];
                
                if (activeStat === 'absent_rate') {
                    if (val < bestVal) { bestVal = val; winners = [tc]; }
                    else if (val === bestVal) { winners.push(tc); }
                } else {
                    if (val > bestVal) { bestVal = val; winners = [tc]; }
                    else if (val === bestVal) { winners.push(tc); }
                }
            });

            let resultMsg = "";
            let collectionMsg = "";
            let nextLeaderId = null;

            if (winners.length > 1) {
                resultMsg = `IT'S A DRAW!`;
                collectionMsg = `${tableCards.length} cards have been added to the POT!`;
                pot = pot.concat(tableCards.map(tc => tc.card));
                nextLeaderId = winners[0].player.id; 
            } else {
                let winner = winners[0];
                let wPlayer = winner.player;
                
                // ACTUAL LOGIC: Winner takes cards from table + pot
                let cardsWon = tableCards.map(tc => tc.card).concat(pot);
                let totalCardsCollected = cardsWon.length;
                
                wPlayer.deck.push(...cardsWon);
                pot = []; 
                
                resultMsg = `🏆 ${wPlayer.name} wins the round!`;
                collectionMsg = `Cards Collected: ${totalCardsCollected} (added to ${wPlayer.name}'s deck)`;
                nextLeaderId = wPlayer.id;
            }

            updateScoreboard();

            document.getElementById('round-winner-msg').innerText = resultMsg;
            document.getElementById('round-stat-msg').innerText = `Winning Stat: ${statLabels[activeStat]} = ${bestVal}`;
            document.getElementById('cards-collected-msg').innerText = collectionMsg;
            
            let resultHtml = "";
            tableCards.forEach(tc => {
                let isWinCard = winners.includes(tc);
                resultHtml += `<div class="card table-card" style="${isWinCard ? 'border-color:var(--secondary); transform:scale(1); box-shadow: 0 0 20px var(--secondary);' : ''}">
                    <div style="color:${isWinCard ? 'var(--secondary)' : '#fff'}; text-align:center;">${tc.player.name}</div>
                    <div class="card-title">${tc.card.name}</div>
                    ${['rollno', 'strength', 'height', 'weight', 'cgpa', 'absent_rate'].map(stat => 
                        `<div class="stat-line ${activeStat === stat ? 'highlight' : ''}"><span>${statLabels[stat]}</span><span>${tc.card[stat]}</span></div>`
                    ).join('')}
                    ${isWinCard ? `<div class="winner-tag">WINNER</div>` : ''}
                </div>`;
            });
            document.getElementById('result-table-area').innerHTML = resultHtml;

            window.nextRoundLeaderId = nextLeaderId;
            switchScreen('result-screen');
        }

        function nextRound() {
            startNewRound(window.nextRoundLeaderId);
        }
    </script>
</body>
</html>
