<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Eagle Simulator - Neon World Tour</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00020a; font-family: 'Courier New', monospace; }
        #hud {
            position: absolute; top: 20px; left: 20px; color: #00ffcc;
            background: rgba(0, 10, 20, 0.8); padding: 15px; border: 1px solid #00ffcc;
            pointer-events: none; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
        .label { color: #55aaaa; margin-right: 5px; }
        .val { color: #ffffff; font-weight: bold; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffcc; font-size: 24px; font-weight: bold; letter-spacing: 5px;
            text-shadow: 0 0 10px #00ffcc; pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="loading">DECRYPTING SATELLITE DATA...</div>

    <div id="hud">
        <div style="font-weight:bold; border-bottom:1px solid #00ffcc; margin-bottom:8px; padding-bottom:5px;">GLOBAL VECTOR SYSTEM</div>
        <div><span class="label">GPS:</span><span id="gps" class="val">0, 0</span></div>
        <div><span class="label">Speed:</span><span id="speed" class="val">MACH 1</span></div>
        <div style="margin-top:10px; font-size: 10px; color: #008888;">[W/S] Pitch | [A/D] Yaw | [Space] Afterburner</div>
    </div>

    <script>
        // --- 1. ENGINE & CYBERPUNK AESTHETICS ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x00020a, 0.00015); // Deep dark space fog
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 50000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x00020a);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambient);

        // Add a digital wireframe grid for the ocean/ground
        const gridHelper = new THREE.GridHelper(50000, 500, 0x002244, 0x001122);
        gridHelper.position.y = -10;
        scene.add(gridHelper);

        // --- 2. THE SCALE OF THE WORLD ---
        // We will multiply Lat/Lon by 100. 
        // Example: Lon 180 = X 18,000. Lat 90 = Z -9,000.
        const WORLD_SCALE = 100;

        function lonToX(lon) { return lon * WORLD_SCALE; }
        function latToZ(lat) { return -lat * WORLD_SCALE; } // Invert because -Z is forward in 3D
        function xToLon(x) { return x / WORLD_SCALE; }
        function zToLat(z) { return -z / WORLD_SCALE; }

        // --- 3. FETCH & PARSE GeoJSON ---
        // This is a free, public JSON file containing the borders of every country.
        const GEOJSON_URL = 'https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json';

        function drawLineString(coords) {
            const points = [];
            coords.forEach(coord => {
                const x = lonToX(coord[0]);
                const z = latToZ(coord[1]);
                points.push(new THREE.Vector3(x, 0, z)); // Draw borders flat on the ground
            });
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.8 });
            return new THREE.Line(geo, mat);
        }

        fetch(GEOJSON_URL)
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none'; // Hide loading text
                
                const mapGroup = new THREE.Group();
                
                // GeoJSON can have complex nesting. We loop through Polygons and MultiPolygons.
                data.features.forEach(feature => {
                    const geom = feature.geometry;
                    if (!geom) return;

                    if (geom.type === 'Polygon') {
                        geom.coordinates.forEach(ring => {
                            mapGroup.add(drawLineString(ring));
                        });
                    } else if (geom.type === 'MultiPolygon') {
                        geom.coordinates.forEach(poly => {
                            poly.forEach(ring => {
                                mapGroup.add(drawLineString(ring));
                            });
                        });
                    }
                });

                scene.add(mapGroup);
            })
            .catch(err => {
                document.getElementById('loading').innerText = "ERROR DOWNLOADING MAP DATA";
                console.error(err);
            });

        // --- 4. THE EAGLE ---
        const eagleGroup = new THREE.Group();
        
        // Neon Blue Eagle
        const bodyMat = new THREE.MeshBasicMaterial({ color: 0x0055ff, wireframe: true });
        const wingMat = new THREE.MeshBasicMaterial({ color: 0x0088ff, wireframe: true });
        
        const body = new THREE.Mesh(new THREE.ConeGeometry(2, 12, 6), bodyMat);
        body.rotateX(Math.PI / 2);
        eagleGroup.add(body);

        const head = new THREE.Mesh(new THREE.SphereGeometry(2, 6, 6), wingMat);
        head.position.set(0, 0.5, -6);
        eagleGroup.add(head);

        const wingGeo = new THREE.BoxGeometry(16, 0.5, 5);
        const leftPivot = new THREE.Group(); leftPivot.position.set(-1.5, 0.5, -1);
        const leftWing = new THREE.Mesh(wingGeo, wingMat); leftWing.position.set(-8, 0, 0); 
        leftPivot.add(leftWing);
        
        const rightPivot = new THREE.Group(); rightPivot.position.set(1.5, 0.5, -1);
        const rightWing = new THREE.Mesh(wingGeo, wingMat); rightWing.position.set(8, 0, 0);
        rightPivot.add(rightWing);

        eagleGroup.add(leftPivot);
        eagleGroup.add(rightPivot);

        eagleGroup.add(camera);
        camera.position.set(0, 40, 80); 
        camera.lookAt(0, -15, -40);

        scene.add(eagleGroup);
        
        // Start position: Let's start near India (Lon: 76, Lat: 20)
        eagleGroup.position.set(lonToX(76), 300, latToZ(20)); 

        // --- 5. FLIGHT ENGINE ---
        let rotation = new THREE.Euler(0, 0, 0, 'YXZ');
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        let time = 0;

        function animate() {
            requestAnimationFrame(animate);

            // Supersonic speeds to cross countries quickly
            const isBoosting = keys['Space'];
            const speed = isBoosting ? 60.0 : 20.0;
            document.getElementById('speed').innerText = isBoosting ? "MACH 3" : "MACH 1";

            // Wing flapping
            time += isBoosting ? 0.3 : 0.1;
            const flap = Math.sin(time) * 0.4;
            leftPivot.rotation.z = -flap;
            rightPivot.rotation.z = flap;

            // Turning controls
            if (keys['KeyW']) rotation.x -= 0.01;
            if (keys['KeyS']) rotation.x += 0.01;
            if (keys['KeyA']) rotation.y += 0.02;
            if (keys['KeyD']) rotation.y -= 0.02;

            eagleGroup.quaternion.setFromEuler(rotation);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(eagleGroup.quaternion);
            eagleGroup.position.addScaledVector(dir, speed);

            eagleGroup.rotation.z = THREE.MathUtils.lerp(eagleGroup.rotation.z, keys['KeyA'] ? 0.6 : (keys['KeyD'] ? -0.6 : 0), 0.1);

            if (eagleGroup.position.y < 20) eagleGroup.position.y = 20; // Don't crash into ground

            // Update GPS HUD
            const currentLon = xToLon(eagleGroup.position.x);
            const currentLat = zToLat(eagleGroup.position.z);
            document.getElementById('gps').innerText = `${currentLat.toFixed(2)}, ${currentLon.toFixed(2)}`;

            renderer.render(scene, camera);
        }

        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
