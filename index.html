<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cy Planet: Strategic Card Battle</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFDE00; /* Bright yellow */
            --secondary: #FF5252; /* Coral red */
            --accent: #4CAF50; /* Green */
            --bg-color: #6ED3FF; /* Sky blue */
            --card-bg: #FFFFFF;
            --dark: #2C3E50; /* Dark blue/grey for borders and text */
        }

        body {
            background-color: var(--bg-color);
            /* Fun polka dot background pattern */
            background-image: radial-gradient(var(--card-bg) 15%, transparent 16%);
            background-size: 30px 30px;
            color: var(--dark);
            font-family: 'Fredoka', sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; text-align: center;
            overflow-x: hidden;
        }

        h1 { 
            color: var(--card-bg); 
            font-size: clamp(2rem, 5vw, 3.5rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 4px 4px 0px var(--dark);
            margin-bottom: 10px;
            border: 4px solid var(--dark);
            background: var(--secondary);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 6px 6px 0px var(--dark);
        }
        
        button {
            background-color: var(--primary); color: var(--dark);
            border: 3px solid var(--dark); padding: 12px 24px; font-size: 1.2rem;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700; border-radius: 12px; cursor: pointer;
            box-shadow: 4px 4px 0px var(--dark);
            transition: all 0.1s ease-in-out; margin: 10px;
            text-transform: uppercase;
        }
        button:hover:not(:disabled) { 
            background-color: #FFF; 
        }
        button:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--dark);
        }
        button:disabled { 
            background-color: #A0B0C0; color: #555; cursor: not-allowed; 
            box-shadow: 4px 4px 0px #555; border-color: #555;
        }

        input {
            padding: 12px; font-size: 1.2rem; border-radius: 10px;
            border: 3px solid var(--dark); background: #FFF; color: var(--dark);
            margin: 5px; text-align: center; font-family: 'Fredoka', sans-serif;
            font-weight: 600; outline: none; box-shadow: 3px 3px 0px var(--dark);
        }

        /* Live Scoreboard */
        #global-scoreboard {
            display: none; flex-wrap: wrap; justify-content: center; gap: 10px;
            background: var(--card-bg); padding: 10px 20px; border-radius: 15px;
            border: 3px solid var(--dark); margin-bottom: 20px; width: 100%; max-width: 800px;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.1);
        }
        .score-item { font-size: 1.2rem; font-weight: 700; background: #EEE; padding: 5px 15px; border-radius: 10px; border: 2px solid var(--dark); }
        .score-item span { color: var(--secondary); font-size: 1.4rem; margin-left: 5px; }
        .eliminated-score { opacity: 0.6; text-decoration: line-through; background: #ffcccc;}

        /* Screens */
        #loading-screen, #setup-screen, #pass-screen, #play-screen, #result-screen, #game-over-screen { 
            display: none; width: 100%; max-width: 900px; 
            background: var(--card-bg); padding: 20px; border-radius: 20px;
            border: 4px solid var(--dark); box-shadow: 8px 8px 0px rgba(0,0,0,0.15);
            box-sizing: border-box; margin-top: 10px;
        }
        .active-screen { display: flex !important; flex-direction: column; align-items: center; }

        /* Deck View Area */
        .deck-container {
            display: flex; gap: 15px; overflow-x: auto; padding: 15px 10px; width: 100%;
            background: #EAF7FF; border-radius: 15px; margin-top: 10px;
            border: 3px solid var(--dark); box-sizing: border-box;
            scroll-behavior: smooth;
        }
        .deck-container::-webkit-scrollbar { height: 12px; }
        .deck-container::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 10px; border: 2px solid var(--dark); }

        /* Card Styles */
        .card {
            background-color: var(--card-bg); width: 160px; min-width: 160px;
            border-radius: 15px; border: 3px solid var(--dark);
            padding: 12px; cursor: pointer; transition: 0.2s; text-align: left;
            position: relative; box-shadow: 4px 4px 0px var(--dark);
            display: flex; flex-direction: column; gap: 5px;
        }
        @media (min-width: 600px) {
            .card { width: 200px; min-width: 200px; padding: 15px; }
        }
        .card:hover { transform: translateY(-5px); box-shadow: 4px 9px 0px var(--dark); }
        .card.selected { border-color: var(--secondary); background-color: #FFF9C4; transform: scale(1.05) translateY(-5px); box-shadow: 5px 10px 0px var(--secondary); }
        
        .card-title { font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 700; color: var(--dark); margin-bottom: 5px; border-bottom: 2px dashed #CCC; padding-bottom: 5px;}
        .stat-line { display: flex; justify-content: space-between; font-size: clamp(0.85rem, 3vw, 1rem); margin: 2px 0; background: #F5F5F5; padding: 6px 8px; border-radius: 8px; font-weight: 600; border: 1px solid #DDD; }
        .stat-line.highlight { background: var(--primary); border-color: var(--dark); color: var(--dark); font-weight: 700; }
        .stat-line.used-stat { color: #999; text-decoration: line-through; background: #E0E0E0; }

        /* Play Area */
        .table-area {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 10px;
            background: #FFF3E0; padding: 20px; border-radius: 15px; width: 100%; min-height: 150px;
            border: 3px dashed var(--dark); box-sizing: border-box;
        }
        .table-card { transform: scale(0.95); pointer-events: none; }

        /* Action Panel */
        #action-panel { margin-top: 20px; padding: 15px; background: #E8F5E9; border: 3px solid var(--accent); border-radius: 15px; width: 100%; display: none; box-sizing: border-box;}
        #leader-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
        .stat-btn { flex: 1 1 30%; font-size: 1rem; padding: 10px; margin: 5px; min-width: 120px; }
        
        .status-box { background: var(--primary); padding: 15px; border-radius: 15px; margin-bottom: 10px; width: 100%; border: 3px solid var(--dark); box-shadow: 4px 4px 0px var(--dark); box-sizing: border-box; }
        .winner-tag { color: var(--card-bg); background: var(--secondary); border: 2px solid var(--dark); border-radius: 8px; font-weight: bold; font-size: 1.2rem; margin-top:10px; padding: 5px; text-transform: uppercase; }
        
        /* Collection Animation Note */
        .collection-note { color: var(--dark); font-size: 1.2rem; font-weight: bold; margin-top: 10px; background: var(--primary); padding: 10px; border-radius: 10px; border: 3px solid var(--dark); }
        .elimination-note { color: var(--card-bg); background: var(--dark); font-size: 1.4rem; font-weight: bold; padding: 15px; border-radius: 10px; border: 3px solid var(--secondary); margin-bottom: 15px; display: none; }

        /* Final Winner Screen Specific */
        #game-over-screen { text-align: center; }
        #final-winner-msg { font-size: clamp(2.5rem, 6vw, 4rem); color: var(--secondary); font-weight: 800; text-shadow: 3px 3px 0px var(--dark); margin: 20px 0; line-height: 1.2;}
        .trophy-icon { font-size: 5rem; margin: 10px 0; }
        #final-stats-msg { font-size: 1.5rem; background: var(--primary); padding: 20px; border-radius: 15px; border: 3px dashed var(--dark); margin-bottom: 30px; }

        h2, h3, h4 { margin: 10px 0; color: var(--dark); }
        
    </style>
</head>
<body>

    <h1>Cy Planet</h1>

    <div id="global-scoreboard"></div>

    <div id="loading-screen" class="active-screen">
        <h2>Loading Data... 🚀</h2>
        <p>Fetching students.json...</p>
    </div>

    <div id="setup-screen">
        <h2>Welcome to Cy Planet! 🌍</h2>
        <h3>How many players? (2-6)</h3>
        <input type="number" id="num-players" min="2" max="6" value="2">
        <button onclick="generateNameInputs()">Next ➔</button>
        <div id="name-inputs" style="margin-top: 20px; display: flex; flex-direction: column; width: 100%; max-width: 300px;"></div>
    </div>

    <div id="pass-screen">
        <h2 style="font-size: 3rem; color: var(--secondary); margin: 0;">STOP! 🛑</h2>
        <h3 id="pass-msg" style="font-size: 1.8rem;">Pass the device to [Player]</h3>
        <p style="font-size: 1.2rem; font-weight: 600;">No peeking! Make sure you're the only one looking.</p>
        <button onclick="showPlayScreen()" style="padding: 20px 40px; font-size: 1.5rem; margin-top:20px;">I'm Ready! 👍</button>
    </div>

    <div id="play-screen">
        <div class="status-box">
            <h2 id="current-player-name" style="margin:0;">Player Turn</h2>
            <p id="target-stat-msg" style="color: var(--dark); font-weight: bold; font-size: 1.2rem; margin-top:5px;"></p>
        </div>

        <h3>⚔️ Cards on the Table ⚔️</h3>
        <div class="table-area" id="current-table-area"></div>
        
        <h3>🃏 Your Deck (Select 1) 🃏</h3>
        <div class="deck-container" id="player-deck-container"></div>

        <div id="action-panel">
            <div id="leader-actions">
                <h4 style="width: 100%;">Choose a Stat to challenge:</h4>
                <button class="stat-btn" id="btn-rollno" onclick="playCardAsLeader('rollno')">Roll No.</button>
                <button class="stat-btn" id="btn-strength" onclick="playCardAsLeader('strength')">Strength</button>
                <button class="stat-btn" id="btn-height" onclick="playCardAsLeader('height')">Height</button>
                <button class="stat-btn" id="btn-weight" onclick="playCardAsLeader('weight')">Weight</button>
                <button class="stat-btn" id="btn-cgpa" onclick="playCardAsLeader('cgpa')">CGPA</button>
                <button class="stat-btn" id="btn-absent_rate" onclick="playCardAsLeader('absent_rate')">Absent Rate</button>
            </div>
            <div id="follower-actions" style="display:none;">
                <button onclick="playCardAsFollower()" style="padding: 15px 30px; font-size: 1.3rem;">Play Selected Card! 💥</button>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <h2 id="round-winner-msg" style="font-size: 2rem; color: var(--accent);"></h2>
        <p id="round-stat-msg" style="font-size: 1.2rem; font-weight: 700;"></p>
        <div id="elimination-msg" class="elimination-note"></div>
        <div id="cards-collected-msg" class="collection-note"></div>
        
        <div class="table-area" id="result-table-area"></div>
        
        <button onclick="nextRound()" style="margin-top: 20px; font-size: 1.4rem;">Next Round ➔</button>
    </div>

    <div id="game-over-screen">
        <div class="trophy-icon">🏆</div>
        <div id="final-winner-msg"></div>
        <div id="final-stats-msg"></div>
        <button onclick="location.reload()" style="padding: 20px 40px; font-size: 1.5rem; margin-top: 10px; background: var(--accent); color: white;">Play Again 🔄</button>
    </div>

    <script>
        let allCards = [];
        let players = [];
        let tableCards = []; 
        let turnQueue = [];  
        let activeStat = null; 
        let pot = []; 
        let selectedCardIndex = null;
        
        let availableStats = ['rollno', 'strength', 'height', 'weight', 'cgpa', 'absent_rate'];

        const statLabels = {
            "rollno": "Roll No.",
            "strength": "Strength", 
            "height": "Height",
            "weight": "Weight", 
            "cgpa": "CGPA", 
            "absent_rate": "Absent Rate"
        };

        // --- 1. Load JSON Data ---
        window.onload = async function() {
            try {
                const response = await fetch('students.json');
                if (!response.ok) throw new Error("File not found");
                const data = await response.json();
                
                allCards = Object.keys(data).map(key => {
                    return { rollno: parseInt(key), ...data[key] };
                });

                switchScreen('setup-screen');
            } catch (error) {
                document.getElementById('loading-screen').innerHTML = `
                    <h2 style="color:var(--secondary);">Error Loading Data! 💔</h2>
                    <p>Make sure you are running a <b>Local Web Server</b> and that <b>students.json</b> is in the same folder.</p>
                `;
                console.error(error);
            }
        };

        function switchScreen(screenId) {
            document.querySelectorAll('body > div.active-screen').forEach(div => div.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            window.scrollTo(0, 0);
        }

        // Live Scoreboard Updater
        function updateScoreboard() {
            const sb = document.getElementById('global-scoreboard');
            if (players.length === 0) {
                sb.style.display = 'none';
                return;
            }
            sb.style.display = 'flex';
            let html = '';
            players.forEach(p => {
                let elimClass = p.eliminated ? 'eliminated-score' : '';
                let icon = p.eliminated ? '💀' : '';
                html += `<div class="score-item ${elimClass}">${p.name} ${icon}: <span>${p.deck.length}</span></div>`;
            });
            if (pot.length > 0) {
                html += `<div class="score-item" style="background:var(--primary);">POT: <span style="color:var(--dark)">${pot.length}</span></div>`;
            }
            sb.innerHTML = html;
        }

        // Game Over Handlers
        function showGameOverScreen(winnerName, winnerCards, loserName, loserCards) {
            document.getElementById('global-scoreboard').style.display = 'none'; // Hide scoreboard
            
            document.getElementById('final-winner-msg').innerHTML = `${winnerName}<br>WINS!`;
            
            let statsHtml = `Collected <b>${winnerCards}</b> cards! 🃏`;
            if (loserName) {
                statsHtml += `<br><span style="font-size:1.1rem; color: var(--dark); margin-top: 10px; display: inline-block;">(Defeated ${loserName} who had ${loserCards} cards)</span>`;
            }
            document.getElementById('final-stats-msg').innerHTML = statsHtml;
            
            switchScreen('game-over-screen');
        }

        function showTieScreen(p1, p2) {
            document.getElementById('global-scoreboard').style.display = 'none';
            document.getElementById('final-winner-msg').innerHTML = `🤝 IT'S A PERFECT TIE! 🤝`;
            document.getElementById('final-stats-msg').innerHTML = `Both ${p1.name} and ${p2.name} survived with exactly ${p1.deck.length} cards! Incredible!`;
            switchScreen('game-over-screen');
        }

        // --- 2. Setup Game ---
        function generateNameInputs() {
            const count = parseInt(document.getElementById('num-players').value);
            const container = document.getElementById('name-inputs');
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                container.innerHTML += `<input type="text" id="p-name-${i}" placeholder="Player ${i+1}">`;
            }
            container.innerHTML += `<button onclick="startGame()" style="margin-top:15px; font-size: 1.4rem;">DEAL CARDS 🃏</button>`;
        }

        function startGame() {
            const count = parseInt(document.getElementById('num-players').value);
            players = [];
            availableStats = ['rollno', 'strength', 'height', 'weight', 'cgpa', 'absent_rate'];
            
            for (let i = 0; i < count; i++) {
                let name = document.getElementById(`p-name-${i}`).value || `Player ${i+1}`;
                players.push({ id: i, name: name, deck: [], eliminated: false });
            }

            let deck = [...allCards].sort(() => Math.random() - 0.5);

            let pIndex = 0;
            while(deck.length > 0) {
                players[pIndex].deck.push(deck.pop());
                pIndex = (pIndex + 1) % players.length;
            }

            let firstLeader = players[Math.floor(Math.random() * players.length)].id;
            updateScoreboard();
            startNewRound(firstLeader);
        }

        // --- 3. Round Logic ---
        function startNewRound(leaderId) {
            let alivePlayers = players.filter(p => !p.eliminated && p.deck.length > 0);
            
            // End conditions: Trigger Final UI Screen instead of alerts
            if (players.length > 2 && alivePlayers.length === 2) {
                let p1 = alivePlayers[0];
                let p2 = alivePlayers[1];
                if (p1.deck.length > p2.deck.length) {
                    showGameOverScreen(p1.name, p1.deck.length, p2.name, p2.deck.length);
                } else if (p2.deck.length > p1.deck.length) {
                    showGameOverScreen(p2.name, p2.deck.length, p1.name, p1.deck.length);
                } else {
                    showTieScreen(p1, p2);
                }
                return;
            }

            if (alivePlayers.length <= 1) {
                let winner = alivePlayers.length === 1 ? alivePlayers[0] : null;
                if(winner) {
                    showGameOverScreen(winner.name, winner.deck.length, null, 0);
                } else {
                    showTieScreen(null, null); // Very rare double-elimination scenario
                }
                return;
            }
            
            if (availableStats.length === 0) {
                alert("♻️ All stats used! The stat pool has been refreshed.");
                availableStats = ['rollno', 'strength', 'height', 'weight', 'cgpa', 'absent_rate'];
            }

            tableCards = [];
            activeStat = null;
            
            turnQueue = [];
            let startIndex = alivePlayers.findIndex(p => p.id === leaderId);
            if (startIndex === -1) startIndex = 0; 
            
            for(let i = 0; i < alivePlayers.length; i++) {
                turnQueue.push(alivePlayers[(startIndex + i) % alivePlayers.length].id);
            }

            updateScoreboard();
            triggerPassScreen();
        }

        function triggerPassScreen() {
            if (turnQueue.length === 0) {
                resolveRound();
                return;
            }
            let nextPlayerId = turnQueue[0];
            let p = players.find(p => p.id === nextPlayerId);
            
            document.getElementById('pass-msg').innerText = `Pass the device to: ${p.name}`;
            switchScreen('pass-screen');
        }

        function showPlayScreen() {
            let pId = turnQueue[0];
            let p = players.find(p => p.id === pId);
            selectedCardIndex = null;
            
            document.getElementById('current-player-name').innerText = `👉 ${p.name}'s Turn`;
            
            let isLeader = (activeStat === null);
            document.getElementById('target-stat-msg').innerText = isLeader ? 
                "👑 You are leading! Pick a card & stat." : 
                `🎯 Beat this Stat: ${statLabels[activeStat]}!`;

            if (isLeader) {
                ['rollno', 'strength', 'height', 'weight', 'cgpa', 'absent_rate'].forEach(stat => {
                    let btn = document.getElementById(`btn-${stat}`);
                    if(availableStats.includes(stat)) {
                        btn.disabled = false;
                        btn.innerText = statLabels[stat];
                    } else {
                        btn.disabled = true;
                        btn.innerText = statLabels[stat] + " (Used)";
                    }
                });
            }

            let tableHtml = "";
            tableCards.forEach(tc => {
                tableHtml += `<div class="card table-card">
                    <div style="color:var(--secondary); font-weight:800; text-align:center; border-bottom: 2px dashed #CCC; margin-bottom: 5px; padding-bottom: 5px;">${tc.player.name}'s Card</div>
                    <div class="card-title">${tc.card.name} <span style="float:right; color:#888;">#${tc.card.rollno}</span></div>
                    ${['rollno', 'strength', 'height', 'weight', 'cgpa', 'absent_rate'].map(stat => 
                        `<div class="stat-line ${activeStat === stat ? 'highlight' : ''}"><span>${statLabels[stat]}</span><span>${tc.card[stat]}</span></div>`
                    ).join('')}
                </div>`;
            });
            document.getElementById('current-table-area').innerHTML = tableHtml || "<p style='color:var(--dark); font-weight:bold; width:100%;'>Table is empty. You go first!</p>";

            let deckHtml = "";
            p.deck.forEach((card, index) => {
                deckHtml += `
                <div class="card" id="deck-card-${index}" onclick="selectCard(${index})">
                    <div class="card-title">${card.name}</div>
                    ${['rollno', 'strength', 'height', 'weight', 'cgpa', 'absent_rate'].map(stat => {
                        let classStr = activeStat === stat ? 'highlight' : '';
                        if(!availableStats.includes(stat) && activeStat !== stat) classStr += ' used-stat';
                        return `<div class="stat-line ${classStr}"><span>${statLabels[stat]}</span><span>${card[stat]}</span></div>`
                    }).join('')}
                </div>`;
            });
            document.getElementById('player-deck-container').innerHTML = deckHtml;

            document.getElementById('action-panel').style.display = 'none'; 
            document.getElementById('leader-actions').style.display = isLeader ? 'flex' : 'none';
            document.getElementById('follower-actions').style.display = isLeader ? 'none' : 'block';

            switchScreen('play-screen');
        }

        function selectCard(index) {
            selectedCardIndex = index;
            document.querySelectorAll('#player-deck-container .card').forEach(el => el.classList.remove('selected'));
            document.getElementById(`deck-card-${index}`).classList.add('selected');
            document.getElementById('action-panel').style.display = 'block';
            document.getElementById('action-panel').scrollIntoView({behavior: "smooth"});
        }

        function playCardAsLeader(stat) {
            activeStat = stat;
            availableStats = availableStats.filter(s => s !== stat);
            finalizePlay();
        }

        function playCardAsFollower() {
            finalizePlay();
        }

        function finalizePlay() {
            let pId = turnQueue.shift();
            let p = players.find(p => p.id === pId);
            
            let playedCard = p.deck.splice(selectedCardIndex, 1)[0];
            tableCards.push({ player: p, card: playedCard });
            
            updateScoreboard();
            triggerPassScreen();
        }

        // --- 4. Resolve Round ---
        function resolveRound() {
            let bestVal = activeStat === 'absent_rate' ? Infinity : -Infinity;
            let winners = [];

            tableCards.forEach(tc => {
                let val = tc.card[activeStat];
                
                if (activeStat === 'absent_rate') {
                    if (val < bestVal) { bestVal = val; winners = [tc]; }
                    else if (val === bestVal) { winners.push(tc); }
                } else {
                    if (val > bestVal) { bestVal = val; winners = [tc]; }
                    else if (val === bestVal) { winners.push(tc); }
                }
            });

            let resultMsg = "";
            let collectionMsg = "";
            let nextLeaderId = null;

            if (winners.length > 1) {
                resultMsg = `⚔️ IT'S A DRAW! ⚔️`;
                collectionMsg = `📦 ${tableCards.length} cards have been added to the POT!`;
                pot = pot.concat(tableCards.map(tc => tc.card));
                nextLeaderId = winners[0].player.id; 
            } else {
                let winner = winners[0];
                let wPlayer = winner.player;
                
                let cardsWon = tableCards.map(tc => tc.card).concat(pot);
                let totalCardsCollected = cardsWon.length;
                
                wPlayer.deck.push(...cardsWon);
                pot = []; 
                
                resultMsg = `🏆 ${wPlayer.name} Wins!`;
                collectionMsg = `Collected: ${totalCardsCollected} Cards (Added to ${wPlayer.name}'s deck)`;
                nextLeaderId = wPlayer.id;
            }

            // Check for Elimination Logic
            let newlyEliminatedText = "";
            players.forEach(p => {
                if (p.deck.length === 0 && !p.eliminated) {
                    p.eliminated = true;
                    newlyEliminatedText += `💀 ${p.name} HAS NO CARDS AND IS ELIMINATED!<br>`;
                }
            });
            
            const elimDiv = document.getElementById('elimination-msg');
            if(newlyEliminatedText !== "") {
                elimDiv.innerHTML = newlyEliminatedText;
                elimDiv.style.display = "block";
            } else {
                elimDiv.style.display = "none";
            }

            updateScoreboard();

            document.getElementById('round-winner-msg').innerText = resultMsg;
            document.getElementById('round-stat-msg').innerText = `Winning Stat: ${statLabels[activeStat]} = ${bestVal}`;
            document.getElementById('cards-collected-msg').innerText = collectionMsg;
            
            let resultHtml = "";
            tableCards.forEach(tc => {
                let isWinCard = winners.includes(tc);
                resultHtml += `<div class="card table-card" style="${isWinCard ? 'border-color:var(--secondary); transform:scale(1.05); box-shadow: 6px 6px 0px var(--secondary); background:#FFF9C4;' : ''}">
                    <div style="color:${isWinCard ? 'var(--secondary)' : 'var(--dark)'}; text-align:center; font-weight:bold;">${tc.player.name}</div>
                    <div class="card-title">${tc.card.name}</div>
                    ${['rollno', 'strength', 'height', 'weight', 'cgpa', 'absent_rate'].map(stat => 
                        `<div class="stat-line ${activeStat === stat ? 'highlight' : ''}"><span>${statLabels[stat]}</span><span>${tc.card[stat]}</span></div>`
                    ).join('')}
                    ${isWinCard ? `<div class="winner-tag">WINNER</div>` : ''}
                </div>`;
            });
            document.getElementById('result-table-area').innerHTML = resultHtml;

            window.nextRoundLeaderId = nextLeaderId;
            switchScreen('result-screen');
        }

        function nextRound() {
            startNewRound(window.nextRoundLeaderId);
        }
    </script>
</body>
</html>
