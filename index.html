<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Real-World Eagle Flight (OSM Edition)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #88ccff; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #hud {
            position: absolute; top: 20px; left: 20px; color: #ffffff;
            background: rgba(0, 20, 40, 0.8); padding: 15px; border-left: 4px solid #00aaff;
            pointer-events: none; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;
            border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #attribution {
            position: absolute; bottom: 10px; right: 10px; color: #333;
            background: rgba(255, 255, 255, 0.7); padding: 5px 10px; font-size: 10px;
            pointer-events: auto; border-radius: 4px;
        }
        #attribution a { color: #0066cc; text-decoration: none; }
        .val { color: #00aaff; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">
        <div style="font-weight:bold; margin-bottom:8px;">REAL-WORLD SATELLITE LINK</div>
        <div>GPS: <span id="gps" class="val">Locating...</span></div>
        <div>Zoom Level: <span class="val">15</span></div>
        <div style="margin-top:10px; font-size: 10px; color: #aaaaaa;">[W/S] Pitch | [A/D] Yaw | [Space] Flap</div>
    </div>

    <div id="attribution">
        © <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap contributors</a>
    </div>

    <script>
        // --- 1. ENGINE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xddeeff);
        scene.fog = new THREE.Fog(0xddeeff, 500, 3000);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.0)); // Maps look best with full flat lighting

        // --- 2. SLIPPY MAP MATH (Real GPS to 3D Grid) ---
        const ZOOM = 15;
        const TILE_SIZE = 1000; // 3D units per map tile
        const VIEW_DIST = 1;    // 3x3 grid around player
        
        // Start in Kochi, Kerala
        let startLat = 9.9312;
        let startLon = 76.2673;

        // Convert GPS to OSM Tile X/Y
        function lon2tile(lon, zoom) { return (Math.floor((lon + 180) / 360 * Math.pow(2, zoom))); }
        function lat2tile(lat, zoom) { return (Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom))); }
        
        // Convert OSM Tile X/Y back to GPS (for HUD)
        function tile2lon(x, z) { return (x / Math.pow(2, z) * 360 - 180); }
        function tile2lat(y, z) { const n = Math.PI - 2 * Math.PI * y / Math.pow(2, z); return (180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)))); }

        let startTileX = lon2tile(startLon, ZOOM);
        let startTileY = lat2tile(startLat, ZOOM);

        // --- 3. TILE LOADER ---
        const tiles = new Map();
        const textureLoader = new THREE.TextureLoader();
        textureLoader.crossOrigin = "Anonymous"; // Required for fetching external images

        function createMapTile(tx, ty) {
            const group = new THREE.Group();
            
            // Calculate real-world OSM tile coordinates
            const osmX = startTileX + tx;
            const osmY = startTileY + ty; // Note: Z axis in 3D is Y axis in OSM tiles
            
            // The magic URL that gets the map image
            const url = `https://tile.openstreetmap.org/${ZOOM}/${osmX}/${osmY}.png`;

            const geo = new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE);
            geo.rotateX(-Math.PI / 2);

            // Create a temporary grey material while image loads
            const mat = new THREE.MeshBasicMaterial({ color: 0xcccccc, wireframe: true });
            const plane = new THREE.Mesh(geo, mat);
            
            // Position in 3D space
            plane.position.set(tx * TILE_SIZE, 0, ty * TILE_SIZE);
            group.add(plane);
            scene.add(group);

            // Load texture asynchronously
            textureLoader.load(url, (texture) => {
                // When loaded, apply texture and remove wireframe
                plane.material = new THREE.MeshBasicMaterial({ map: texture });
            });

            return group;
        }

        // --- 4. THE EAGLE ---
        const eagleGroup = new THREE.Group();
        
        const bodyMat = new THREE.MeshBasicMaterial({ color: 0x3a1e05 });
        const whiteMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        const body = new THREE.Mesh(new THREE.ConeGeometry(2, 12, 6), bodyMat);
        body.rotateX(Math.PI / 2);
        eagleGroup.add(body);

        const head = new THREE.Mesh(new THREE.SphereGeometry(2, 6, 6), whiteMat);
        head.position.set(0, 0.5, -6);
        eagleGroup.add(head);

        const wingGeo = new THREE.BoxGeometry(16, 0.5, 5);
        const leftPivot = new THREE.Group(); leftPivot.position.set(-1.5, 0.5, -1);
        const leftWing = new THREE.Mesh(wingGeo, bodyMat); leftWing.position.set(-8, 0, 0); 
        leftPivot.add(leftWing);
        
        const rightPivot = new THREE.Group(); rightPivot.position.set(1.5, 0.5, -1);
        const rightWing = new THREE.Mesh(wingGeo, bodyMat); rightWing.position.set(8, 0, 0);
        rightPivot.add(rightWing);

        eagleGroup.add(leftPivot);
        eagleGroup.add(rightPivot);

        eagleGroup.add(camera);
        camera.position.set(0, 30, 60); 
        camera.lookAt(0, -10, -30);

        scene.add(eagleGroup);
        eagleGroup.position.set(0, 300, 0); // Start high up

        // --- 5. TILE MANAGEMENT ---
        function updateMap() {
            // Player's grid position relative to start
            const curX = Math.round(eagleGroup.position.x / TILE_SIZE);
            const curZ = Math.round(eagleGroup.position.z / TILE_SIZE);

            // Load new tiles
            for (let i = -VIEW_DIST; i <= VIEW_DIST; i++) {
                for (let j = -VIEW_DIST; j <= VIEW_DIST; j++) {
                    const key = `${curX + i},${curZ + j}`;
                    if (!tiles.has(key)) tiles.set(key, createMapTile(curX + i, curZ + j));
                }
            }

            // Unload old tiles to save memory
            for (const [key, group] of tiles) {
                const [tx, tz] = key.split(',').map(Number);
                if (Math.abs(tx - curX) > VIEW_DIST + 1 || Math.abs(tz - curZ) > VIEW_DIST + 1) {
                    scene.remove(group);
                    tiles.delete(key);
                }
            }

            // Update GPS HUD
            const currentLon = tile2lon(startTileX + curX + 0.5, ZOOM);
            const currentLat = tile2lat(startTileY + curZ + 0.5, ZOOM);
            document.getElementById('gps').innerText = `${currentLat.toFixed(4)}, ${currentLon.toFixed(4)}`;
        }

        // --- 6. FLIGHT CONTROLS ---
        let rotation = new THREE.Euler(0, 0, 0, 'YXZ');
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        let time = 0;

        function animate() {
            requestAnimationFrame(animate);

            // Moderate speeds so we don't spam the OSM server
            const speed = keys['Space'] ? 12.0 : 5.0; 

            time += keys['Space'] ? 0.2 : 0.05;
            const flap = Math.sin(time) * 0.4;
            leftPivot.rotation.z = -flap;
            rightPivot.rotation.z = flap;

            if (keys['KeyW']) rotation.x -= 0.01;
            if (keys['KeyS']) rotation.x += 0.01;
            if (keys['KeyA']) rotation.y += 0.015;
            if (keys['KeyD']) rotation.y -= 0.015;

            eagleGroup.quaternion.setFromEuler(rotation);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(eagleGroup.quaternion);
            eagleGroup.position.addScaledVector(dir, speed);

            eagleGroup.rotation.z = THREE.MathUtils.lerp(eagleGroup.rotation.z, keys['KeyA'] ? 0.4 : (keys['KeyD'] ? -0.4 : 0), 0.1);

            if (eagleGroup.position.y < 20) eagleGroup.position.y = 20;

            updateMap();
            renderer.render(scene, camera);
        }

        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
