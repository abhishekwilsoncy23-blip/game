<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Eagle Simulator - Cinematic 'Slow Roads' Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #88ccff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #hud {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #ffffff; text-align: center; background: rgba(0, 0, 0, 0.3);
            padding: 15px 30px; border-radius: 30px; backdrop-filter: blur(5px);
            pointer-events: none; font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
        }
        .highlight { color: #ffcc00; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">
        Cinematic Eagle Flight <span style="margin:0 15px;">|</span> 
        Alt: <span id="alt" class="highlight">0</span>m <span style="margin:0 15px;">|</span> 
        [W/S/A/D] Fly • [Space] Dive
    </div>

    <script>
        // --- 1. ENGINE & CINEMATIC RENDERING ---
        const scene = new THREE.Scene();
        // Soft horizon fog that blends directly into the sky color
        const skyColor = new THREE.Color(0x88ccff);
        scene.background = skyColor;
        scene.fog = new THREE.Fog(skyColor, 500, 4500); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Sharp resolution
        
        // Slow Roads Color Magic:
        renderer.toneMapping = THREE.ACESFilmicToneMapping; 
        renderer.toneMappingExposure = 1.1;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Soft shadow edges
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING (Golden Hour) ---
        const ambient = new THREE.AmbientLight(0xddeeff, 0.6); // Cool sky light fill
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffeedd, 1.5); // Warm sun
        sun.position.set(1000, 1500, -1000);
        sun.castShadow = true;
        
        // High-res shadow map for the landscape
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.near = 100;
        sun.shadow.camera.far = 4000;
        sun.shadow.camera.left = -1500;
        sun.shadow.camera.right = 1500;
        sun.shadow.camera.top = 1500;
        sun.shadow.camera.bottom = -1500;
        sun.shadow.bias = -0.001;
        scene.add(sun);

        // --- 3. ROLLING HILLS (Procedural Math) ---
        const TILE_SIZE = 3000;
        const SEGMENTS = 64; // High poly for smooth curves
        const VIEW_DIST = 1;
        const tiles = new Map();

        // Deterministic elevation so tiles stitch together perfectly
        function getElevation(x, z) {
            let y = Math.sin(x * 0.0008) * 300; // Big rolling hills
            y += Math.sin(z * 0.001) * 250;
            y += Math.sin((x + z) * 0.003) * 50; // Small bumps
            return y;
        }

        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x44aa44,  // Lush stylized green
            roughness: 0.8,   // Not shiny
            metalness: 0.1,
            flatShading: false // Smooth gradients
        });

        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x553311, roughness: 0.9 });
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x228822, roughness: 0.8, flatShading: true });

        function createTile(tx, tz) {
            const group = new THREE.Group();
            const worldX = tx * TILE_SIZE;
            const worldZ = tz * TILE_SIZE;

            // Smooth Terrain Mesh
            const geo = new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE, SEGMENTS, SEGMENTS);
            geo.rotateX(-Math.PI / 2);
            const pos = geo.attributes.position;
            
            for (let i = 0; i < pos.count; i++) {
                const vx = pos.getX(i) + worldX;
                const vz = pos.getZ(i) + worldZ;
                const vy = getElevation(vx, vz);
                pos.setY(i, vy);
            }
            geo.computeVertexNormals(); // This makes the lighting hit the curves beautifully

            const terrain = new THREE.Mesh(geo, groundMat);
            terrain.position.set(worldX, 0, worldZ);
            terrain.receiveShadow = true;
            group.add(terrain);

            // Add Stylized Trees
            for (let i = 0; i < 40; i++) {
                const rx = worldX + (Math.random() - 0.5) * TILE_SIZE;
                const rz = worldZ + (Math.random() - 0.5) * TILE_SIZE;
                const ry = getElevation(rx, rz);

                // Skip trees in deep valleys (makes it look like water basins)
                if (ry < -50) continue;

                const tree = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(3, 5, 20, 5), trunkMat);
                trunk.position.y = 10;
                trunk.castShadow = true;
                
                const leaves = new THREE.Mesh(new THREE.IcosahedronGeometry(25, 0), leafMat);
                leaves.position.y = 30;
                leaves.scale.set(1, 1.5, 1);
                leaves.castShadow = true;

                tree.add(trunk);
                tree.add(leaves);
                tree.position.set(rx, ry, rz);
                
                // Random tilt for natural look
                tree.rotation.x = (Math.random() - 0.5) * 0.2;
                tree.rotation.z = (Math.random() - 0.5) * 0.2;
                group.add(tree);
            }

            scene.add(group);
            return group;
        }

        // --- 4. THE EAGLE (Casts Shadows) ---
        const eagleGroup = new THREE.Group();
        
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3a1e05, roughness: 0.6 });
        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
        
        const body = new THREE.Mesh(new THREE.ConeGeometry(2, 12, 6), bodyMat);
        body.rotateX(Math.PI / 2);
        body.castShadow = true;
        eagleGroup.add(body);

        const head = new THREE.Mesh(new THREE.SphereGeometry(2, 6, 6), whiteMat);
        head.position.set(0, 0.5, -6);
        head.castShadow = true;
        eagleGroup.add(head);

        const wingGeo = new THREE.BoxGeometry(16, 0.5, 5);
        const leftPivot = new THREE.Group(); leftPivot.position.set(-1.5, 0.5, -1);
        const leftWing = new THREE.Mesh(wingGeo, bodyMat); leftWing.position.set(-8, 0, 0); leftWing.castShadow = true;
        leftPivot.add(leftWing);
        
        const rightPivot = new THREE.Group(); rightPivot.position.set(1.5, 0.5, -1);
        const rightWing = new THREE.Mesh(wingGeo, bodyMat); rightWing.position.set(8, 0, 0); rightWing.castShadow = true;
        rightPivot.add(rightWing);

        eagleGroup.add(leftPivot);
        eagleGroup.add(rightPivot);

        // Camera setup for that cinematic sweeping view
        eagleGroup.add(camera);
        camera.position.set(0, 15, 45); 
        camera.lookAt(0, -5, -30);

        scene.add(eagleGroup);
        eagleGroup.position.set(0, 800, 0);

        // --- 5. TILE MANAGEMENT ---
        function updateMap() {
            const curX = Math.round(eagleGroup.position.x / TILE_SIZE);
            const curZ = Math.round(eagleGroup.position.z / TILE_SIZE);

            for (let i = -VIEW_DIST; i <= VIEW_DIST; i++) {
                for (let j = -VIEW_DIST; j <= VIEW_DIST; j++) {
                    const key = `${curX + i},${curZ + j}`;
                    if (!tiles.has(key)) tiles.set(key, createTile(curX + i, curZ + j));
                }
            }

            for (const [key, group] of tiles) {
                const [tx, tz] = key.split(',').map(Number);
                if (Math.abs(tx - curX) > VIEW_DIST + 1 || Math.abs(tz - curZ) > VIEW_DIST + 1) {
                    scene.remove(group);
                    tiles.delete(key);
                }
            }
        }

        // --- 6. SMOOTH FLIGHT CONTROLS ---
        let rotation = new THREE.Euler(0, 0, 0, 'YXZ');
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        let time = 0;

        function animate() {
            requestAnimationFrame(animate);

            // Keep the sun following the eagle so shadows always render locally
            sun.position.x = eagleGroup.position.x + 1000;
            sun.position.z = eagleGroup.position.z - 1000;
            sun.target = eagleGroup;

            const isBoosting = keys['Space'];
            const speed = isBoosting ? 25.0 : 12.0;

            // Flapping mechanics
            time += isBoosting ? 0.25 : 0.08;
            const flap = Math.sin(time) * (isBoosting ? 0.6 : 0.3);
            leftPivot.rotation.z = -flap;
            rightPivot.rotation.z = flap;

            // Smooth Turning
            if (keys['KeyW']) rotation.x -= 0.015;
            if (keys['KeyS']) rotation.x += 0.015;
            if (keys['KeyA']) rotation.y += 0.02;
            if (keys['KeyD']) rotation.y -= 0.02;

            eagleGroup.quaternion.setFromEuler(rotation);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(eagleGroup.quaternion);
            eagleGroup.position.addScaledVector(dir, speed);

            // Visual Banking
            eagleGroup.rotation.z = THREE.MathUtils.lerp(eagleGroup.rotation.z, keys['KeyA'] ? 0.6 : (keys['KeyD'] ? -0.6 : 0), 0.1);

            // Ground Collision Detection
            const groundHeight = getElevation(eagleGroup.position.x, eagleGroup.position.z);
            if (eagleGroup.position.y < groundHeight + 20) {
                eagleGroup.position.y = groundHeight + 20;
                rotation.x = 0; // Auto-level out to prevent crashing through the floor
            }

            document.getElementById('alt').innerText = Math.floor(eagleGroup.position.y - groundHeight);

            updateMap();
            renderer.render(scene, camera);
        }

        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
